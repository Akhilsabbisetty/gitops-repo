apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inventory-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Akhilsabbisetty/gitops-repo
    targetRevision: HEAD
    path: base/inventory
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy: {}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |-
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'sneakhive-https-probes'
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              - https://sneakhive.ascloud.space
              - https://user.ascloud.space/users
              - https://inventory.ascloud.space/inventory
              - https://order.ascloud.space/orders
              - https://payment.ascloud.space/payment
              - https://notification.ascloud.space/notification
              - https://grafana.ascloud.space
              - https://kibana.ascloud.space
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter:9115
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default

data:
  prometheus.yml: |-
    global:
      scrape_interval: 15s

    scrape_configs:

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'sneakhive-https-probes'
        metrics_path: /probe
        params:
          module: [http_2xx]

        static_configs:
          - targets:
              - https://sneakhive.ascloud.space
              - https://user.ascloud.space/users
              - https://inventory.ascloud.space/inventory
              - https://order.ascloud.space/orders
              - https://payment.ascloud.space/payment
              - https://notification.ascloud.space/notification
              - https://grafana.ascloud.space
              - https://kibana.ascloud.space
              - http://redpanda.ascloud.space

        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target

          - source_labels: [__param_target]
            target_label: instance

          - target_label: __address__
            replacement: blackbox-exporter:9115

      - job_name: 'kube-state-metrics'
        static_configs:
          - targets:
              - kube-state-metrics.kube-system.svc.cluster.local:8080

      - job_name: 'kubernetes-cadvisor'
        kubernetes_sd_configs:
          - role: node

        scheme: https

        tls_config:
          insecure_skip_verify: true

        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443

          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
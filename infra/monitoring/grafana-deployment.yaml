apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana

    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest

          ports:
            - containerPort: 3000

          env:
            - name: GF_SERVER_ROOT_URL
              value: https://grafana.ascloud.space/

            - name: GF_SERVER_DOMAIN
              value: grafana.ascloud.space

            - name: GF_SERVER_PROTOCOL
              value: http

            - name: GF_SERVER_ENFORCE_DOMAIN
              value: "false"
  
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "false"

            - name: GF_SECURITY_COOKIE_SECURE
              value: "true"

            - name: GF_SECURITY_COOKIE_SAMESITE
              value: none
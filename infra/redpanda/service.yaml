apiVersion: v1
kind: Service
metadata:
  name: redpanda
spec:
  selector:
    app: redpanda
  ports:
    - name: kafka-internal
      port: 9092
      targetPort: 9092

---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-external
spec:
  type: LoadBalancer
  selector:
    app: redpanda
  ports:
    - name: kafka-external
      port: 19092
      targetPort: 19092
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:latest
          args:
            - redpanda
            - start
            - --overprovisioned
            - --smp=1
            - --memory=1G
            - --reserve-memory=0M
            - --node-id=0
            - --check=false
            - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
            - --advertise-kafka-addr=internal://redpanda:9092,external://redpanda.ascloud.space:19092
          ports:
            - name: kafka-internal
              containerPort: 9092
            - name: kafka-external
              containerPort: 19092
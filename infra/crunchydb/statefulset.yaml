apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 3

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres:15

          ports:
            - containerPort: 5432

          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: POSTGRES_PASSWORD

            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: POSTGRES_DB

            - name: REPL_USER
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: REPL_USER

            - name: REPL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: REPL_PASSWORD

          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data

          command:
            - bash
            - -c
            - |
              if [ "$(hostname)" = "postgres-0" ]; then
                echo "Starting primary..."

                if [ ! -s "$PGDATA/PG_VERSION" ]; then
                  docker-entrypoint.sh postgres &
                  pid=$!

                  until pg_isready -U "$POSTGRES_USER"; do
                    sleep 2
                  done

                  psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "CREATE ROLE $REPL_USER WITH REPLICATION LOGIN PASSWORD '$REPL_PASSWORD';" || true

                  echo "host replication $REPL_USER 0.0.0.0/0 md5" >> "$PGDATA/pg_hba.conf"
                  echo "wal_level = replica" >> "$PGDATA/postgresql.conf"
                  echo "max_wal_senders = 10" >> "$PGDATA/postgresql.conf"
                  echo "wal_keep_size = 256MB" >> "$PGDATA/postgresql.conf"
                  echo "listen_addresses = '*'" >> "$PGDATA/postgresql.conf"

                  kill "$pid"
                  wait "$pid"
                fi

                exec docker-entrypoint.sh postgres

              else
                echo "Starting replica..."

                if [ ! -s "$PGDATA/PG_VERSION" ]; then
                  rm -rf "$PGDATA"/*
                  until PGPASSWORD="$REPL_PASSWORD" pg_basebackup \
                    -h postgres-0.postgres \
                    -D "$PGDATA" \
                    -U "$REPL_USER" \
                    -Fp \
                    -Xs \
                    -P \
                    -R; do
                    echo "Waiting for primary..."
                    sleep 5
                  done
                fi

                exec docker-entrypoint.sh postgres
              fi

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 20Gi
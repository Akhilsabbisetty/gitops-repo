apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: nexus.ascloud.space/notification-service:4
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: redpanda:9092
            - name: SPRING_KAFKA_CONSUMER_GROUP_ID
              value: notification-service
            - name: SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET
              value: earliest
            - name: SMTP_HOST
              value: smtp.gmail.com
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USERNAME
              valueFrom:
              secretKeyRef:
                name: smtp-secret
                key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
              secretKeyRef:
                name: smtp-secret
                key: SMTP_PASSWORD